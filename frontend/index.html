<!doctype html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HFT Excel Localhost</title>
    <link rel="stylesheet" href="/frontend/styles.css" />
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>HFT Excel</h1>
            <p>Lokalny podgląd workbooka</p>
        </div>

        <div class="panel">
            <h2>Excele</h2>
            <div id="workbook-info" class="muted">Ładowanie...</div>
        </div>

        <div class="panel">
            <h2>Arkusze</h2>
            <div id="sheet-list" class="sheet-list"></div>
        </div>
    </aside>

    <main class="main">
        <section class="topbar">
            <div>
                <h2 id="active-sheet-title">Wybierz arkusz</h2>
                <p id="active-sheet-meta" class="muted">Brak danych</p>
            </div>
        </section>

        <section class="content-grid">
            <div class="panel table-panel">
                <div class="panel-header">
                    <h3>Kolorowe pola</h3>
                    <span id="candidates-meta" class="muted"></span>
                </div>

                <div class="filter-bar">
                    <button type="button" class="filter-button active" data-filter="all">Wszystkie</button>
                    <button type="button" class="filter-button" data-filter="display">Display</button>
                    <button type="button" class="filter-button" data-filter="result">Result</button>
                    <button type="button" class="filter-button" data-filter="input_1">Input 1</button>
                    <button type="button" class="filter-button" data-filter="input_2">Input 2</button>
                    <button type="button" class="filter-button" data-filter="dropdown">Dropdown</button>
                </div>

                <div id="candidates-container" class="candidates-container">
                    <div class="placeholder">Wybierz arkusz, aby zobaczyć dane.</div>
                </div>
            </div>

            <div class="side-panels">
                <div class="panel">
                    <h3>Podsumowanie arkusza</h3>
                    <div id="sheet-summary" class="details-list">
                        <div class="placeholder">Brak danych.</div>
                    </div>
                </div>

                <div class="panel">
                    <h3>Szczegóły komórki</h3>
                    <div id="cell-details" class="details-list">
                        <div class="placeholder">Kliknij pole z listy.</div>
                    </div>
                </div>

                <div class="panel">
                    <h3>Formuły</h3>
                    <button id="load-formulas-button" class="secondary-button" type="button">
                        Wczytaj formuły
                    </button>
                    <div id="formulas-list" class="formula-list">
                        <div class="placeholder">Formuły nie zostały jeszcze wczytane.</div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>

<script type="module" src="/frontend/js/app.js"></script>
</body>
</html>
